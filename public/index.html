<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>지서우</title>
<style>
  body {
    font-family: "Segoe UI", sans-serif;
    background: #f3f3f3;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .chat-container {
    width: 420px;
    height: 700px;
    background: #fff;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    display: flex;
    flex-direction: column;
  }

  .header {
    background: #111;
    color: #fff;
    padding: 18px;
    text-align: center;
    font-size: 18px;
    font-weight: 700;
  }

  .chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    background: #f7f7f7;
  }

  .message {
    display: flex;
    margin-bottom: 12px;
  }

  .message.user {
    justify-content: flex-end;
  }

  .message.bot {
    justify-content: flex-start;
  }

  .bubble {
    max-width: 72%;
    padding: 12px 14px;
    border-radius: 18px;
    line-height: 1.5;
    font-size: 15px;
    white-space: pre-wrap;
    word-break: keep-all;
  }

  .user .bubble {
    background: #111;
    color: white;
    border-bottom-right-radius: 6px;
  }

  .bot .bubble {
    background: #e9e9e9;
    color: #111;
    border-bottom-left-radius: 6px;
  }

  .input-area {
    display: flex;
    border-top: 1px solid #ddd;
    background: white;
  }

  .input-area input {
    flex: 1;
    border: none;
    outline: none;
    padding: 16px;
    font-size: 15px;
  }

  .input-area button {
    border: none;
    background: #111;
    color: white;
    padding: 0 18px;
    cursor: pointer;
    font-size: 15px;
  }
</style>
</head>
<body>
  <div class="chat-container">
    <div class="header">지서우</div>
    <div class="chat-box" id="chat"></div>
    <div class="input-area">
      <input id="input" type="text" placeholder="메시지를 입력해..." />
      <button onclick="send()">전송</button>
    </div>
  </div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");

  // 브라우저에 고정 세션 ID 저장
  let sessionId = localStorage.getItem("seowoo_session_id");
  if (!sessionId) {
    sessionId = crypto.randomUUID();
    localStorage.setItem("seowoo_session_id", sessionId);
  }

  function addMessage(role, text) {
    const wrapper = document.createElement("div");
    wrapper.className = `message ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMessage("user", text);
    input.value = "";

try {
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: text,
      sessionId: sessionId
    })
  });

      const data = await res.json();

      if (data.reply) {
        addMessage("bot", data.reply);
      } else {
        addMessage("bot", "…응, 지금은 말이 조금 안 나와.");
      }
    } catch (err) {
      addMessage("bot", "연결이 잠깐 끊겼어. 다시 말 걸어줄래?");
    }
  }

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") send();
  });
</script>
</body>
</html>
